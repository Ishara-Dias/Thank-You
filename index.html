<!DOCTYPE html>
<html>
<head>
<title>Lunch Reservation Confirmation</title>
<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}
.ref{
font-size:40px;
color:green;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Your Lunch Reservation is Confirmed</h2>
<p>Your Reference Number:</p>

<div class="ref" id="refnum">Loading...</div>

<script>
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

if(ref){
document.getElementById("refnum").innerText = ref;
}else{
document.getElementById("refnum").innerText = "Reference Not Found";
}
</script>

</body>
</html>
